name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Extract version
        id: version
        run: |
          VER=$(grep "APP_VERSION" www/index.html | sed "s/.*'\(.*\)'.*/\1/")
          echo "APP_VERSION=$VER" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v$VER" >> $GITHUB_OUTPUT

      - name: Auto-update versionCode
        run: |
          VER="${{ steps.version.outputs.APP_VERSION }}"
          # Convert 1.0.2 → 10002, 1.0.3 → 10003, etc.
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)
          VCODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "versionCode=$VCODE"
          sed -i "s/versionCode [0-9]*/versionCode $VCODE/" android/app/build.gradle

      - name: Install dependencies
        run: npm install

      - name: Sync web assets & Android plugins
        run: npx cap sync

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ANDROID_HOME="" ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/mcu-review-app-v${{ steps.version.outputs.APP_VERSION }}.apk

      - name: Generate Release Notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.TAG_NAME }}"
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          NOTES="📱 **微机原理复习宝典 v${{ steps.version.outputs.APP_VERSION }}**"
          if [ "${{ steps.version.outputs.APP_VERSION }}" = "1.0.2" ]; then
            NOTES="$NOTES"$'\n\n'"本次更新："
          else
            NOTES="$NOTES"$'\n'
          fi
          if [ -n "$PREV_TAG" ]; then
            NOTES="$NOTES"$'\n'"---"
            # Group commits by type
            FEATS=$(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | grep -c "^[0-9a-f]* feat" || true)
            FIXES=$(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | grep -c "^[0-9a-f]* fix" || true)
            CHORES=$(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | grep -c "^[0-9a-f]* chore\|^[0-9a-f]* docs" || true)

            if [ "$FEATS" -gt 0 ]; then
              NOTES="$NOTES"$'\n'"### 🚀 新功能"
              while IFS= read -r line; do
                MSG=$(echo "$line" | sed 's/^[0-9a-f]* feat: //')
                NOTES="$NOTES"$'\n'"- $MSG"
              done < <(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | grep "^[0-9a-f]* feat")
            fi
            if [ "$FIXES" -gt 0 ]; then
              NOTES="$NOTES"$'\n'"### 🐛 修复"
              while IFS= read -r line; do
                MSG=$(echo "$line" | sed 's/^[0-9a-f]* fix: //')
                NOTES="$NOTES"$'\n'"- $MSG"
              done < <(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | grep "^[0-9a-f]* fix")
            fi
            if [ "$CHORES" -gt 0 ]; then
              NOTES="$NOTES"$'\n'"### 📝 其他"
              while IFS= read -r line; do
                MSG=$(echo "$line" | sed 's/^[0-9a-f]*.*: //')
                NOTES="$NOTES"$'\n'"- $MSG"
              done < <(git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | grep "^[0-9a-f]* chore\|^[0-9a-f]* docs")
            fi
          else
            NOTES="$NOTES"$'\n'"首次发布 🎉"
          fi
          # Write notes to file to avoid shell escaping issues
          echo "$NOTES" > release_notes.md
          echo "NOTES_FILE=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        run: |
          TAG="${{ steps.version.outputs.TAG_NAME }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --title "v${{ steps.version.outputs.APP_VERSION }}" \
            --notes-file "${{ steps.notes.outputs.NOTES_FILE }}" \
            --latest \
            android/app/build/outputs/apk/release/mcu-review-app-v${{ steps.version.outputs.APP_VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
