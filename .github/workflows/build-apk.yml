name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Show files
        run: ls -la www/ && echo "---" && cat capacitor.config.json

      - name: Install dependencies
        run: npm install

      - name: Sync web assets
        run: npx cap copy

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ANDROID_HOME="" ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcu-review-app-debug
          path: android/app/build/outputs/apk/debug/*.apk
