name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Auto-bump version
        id: version
        run: |
          OLD_VER=$(grep "APP_VERSION" www/index.html | sed "s/.*'\(.*\)'.*/\1/")
          echo "OLD_VERSION=$OLD_VER" >> $GITHUB_OUTPUT
          # Bump patch: 1.0.3 → 1.0.4
          MAJOR=$(echo "$OLD_VER" | cut -d. -f1)
          MINOR=$(echo "$OLD_VER" | cut -d. -f2)
          PATCH=$(echo "$OLD_VER" | cut -d. -f3)
          NEW_VER="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "APP_VERSION=$NEW_VER" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v$NEW_VER" >> $GITHUB_OUTPUT
          # Update index.html
          sed -i "s/const APP_VERSION = '${OLD_VER}';/const APP_VERSION = '${NEW_VER}';/" www/index.html
          # Update build.gradle versionName
          sed -i "s/versionName \"${OLD_VER}\"/versionName \"${NEW_VER}\"/" android/app/build.gradle
          # Update versionCode
          VCODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH + 1 ))
          sed -i "s/versionCode [0-9]*/versionCode $VCODE/" android/app/build.gradle
          echo "version bump: $OLD_VER → $NEW_VER (versionCode: $VCODE)"

      - name: Install dependencies
        run: npm install

      - name: Sync web assets & Android plugins
        run: npx cap sync

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ANDROID_HOME="" ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/mcu-review-app-v${{ steps.version.outputs.APP_VERSION }}.apk

      - name: Generate Release Notes
        id: notes
        run: |
          VER="${{ steps.version.outputs.APP_VERSION }}"
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")

          cat > release_notes.md <<- NOTEEND
          📱 **微机原理复习宝典 v${VER}**
          NOTEEND

          if [ -n "$PREV_TAG" ]; then
            echo "---" >> release_notes.md

            # Group by type
            git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null | sed 's/^[0-9a-f]* //' > /tmp/all_commits

            [ -s /tmp/all_commits ] || { echo "首次发布 🎉" > release_notes.md; echo "NOTES_FILE=release_notes.md" >> $GITHUB_OUTPUT; exit 0; }

            grep "^feat:" /tmp/all_commits | sed 's/^feat: //' > /tmp/feats || true
            grep "^fix:" /tmp/all_commits | sed 's/^fix: //' > /tmp/fixes || true
            grep -E "^(chore|docs):" /tmp/all_commits | sed 's/^[a-z]*: //' > /tmp/others || true

            if [ -s /tmp/feats ]; then
              echo "### 🚀 新功能" >> release_notes.md
              sed 's/^/- /' /tmp/feats >> release_notes.md
            fi
            if [ -s /tmp/fixes ]; then
              echo "### 🐛 修复" >> release_notes.md
              sed 's/^/- /' /tmp/fixes >> release_notes.md
            fi
            if [ -s /tmp/others ]; then
              echo "### 📝 其他" >> release_notes.md
              sed 's/^/- /' /tmp/others >> release_notes.md
            fi
          else
            echo "首次发布 🎉" >> release_notes.md
          fi

          echo "NOTES_FILE=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        run: |
          TAG="${{ steps.version.outputs.TAG_NAME }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "$TAG" 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --title "v${{ steps.version.outputs.APP_VERSION }}" \
            --notes-file "${{ steps.notes.outputs.NOTES_FILE }}" \
            --latest \
            android/app/build/outputs/apk/release/mcu-review-app-v${{ steps.version.outputs.APP_VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add www/index.html android/app/build.gradle
          git commit -m "chore: bump version to ${{ steps.version.outputs.APP_VERSION }} [skip ci]"
          git push
