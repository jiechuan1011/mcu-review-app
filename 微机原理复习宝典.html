<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="微机复习">
<meta name="theme-color" content="#4a6cf7">
<title>微机原理复习宝典</title>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

<style>
:root {
  --bg: #f5f7fa;
  --card: #fff;
  --primary: #4a6cf7;
  --primary-light: #e8edff;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
  --text: #1e293b;
  --text-light: #64748b;
  --border: #e2e8f0;
  --radius: 12px;
  --wrong-bg: #fef2f2;
  --wrong-border: #fecaca;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header { background: linear-gradient(135deg, var(--primary), #6366f1); color: white; padding: 20px 24px; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 22px; font-weight: 700; }
header p { font-size: 13px; opacity: .85; margin-top: 4px; }

nav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 64px; z-index: 99; overflow-x: auto; }
nav button { flex: 1; padding: 10px 6px; border: none; background: none; font-size: 13px; font-weight: 600; color: var(--text-light); cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; min-width: 60px; }
nav button.active { color: var(--primary); border-bottom-color: var(--primary); background: var(--primary-light); }
nav button:hover:not(.active) { background: #f1f5f9; }
nav button .badge { background: var(--danger); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 2px; }

main { max-width: 800px; margin: 0 auto; padding: 16px; display: none; }
main.active { display: block; }

.tab-header { margin-bottom: 16px; }
.tab-header h2 { font-size: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.tab-header p { color: var(--text-light); font-size: 14px; margin-top: 4px; }

.card { background: var(--card); border-radius: var(--radius); box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 12px; overflow: hidden; }

/* Notes Section */
.topic-btn { width: 100%; padding: 14px 16px; border: none; background: none; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 600; color: var(--text); text-align: left; border-bottom: 1px solid var(--border); transition: background .15s; }
.topic-btn:hover { background: #f8fafc; }
.topic-btn .icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.topic-btn .arrow { margin-left: auto; transition: transform .2s; color: var(--text-light); }
.topic-btn.open .arrow { transform: rotate(90deg); }
.topic-content { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
.topic-content.open { max-height: 2000px; }
.topic-inner { padding: 16px; font-size: 14px; line-height: 1.8; }
.topic-inner h3 { font-size: 15px; margin: 16px 0 8px; color: var(--primary); }
.topic-inner h3:first-child { margin-top: 0; }
.topic-inner ul { padding-left: 20px; margin: 6px 0; }
.topic-inner li { margin: 4px 0; }
.topic-inner .key { color: var(--danger); font-weight: 700; cursor: default; transition: all .2s; border-radius: 3px; padding: 0 2px; }
.topic-inner .code { font-family: 'Cascadia Code', 'Consolas', monospace; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.topic-inner .highlight { background: #fef9c3; padding: 1px 4px; border-radius: 3px; }

/* Notes self-test mode */
.self-test-mode .key { background: #e2e8f0; color: transparent !important; border-radius: 4px; user-select: none; position: relative; }
.self-test-mode .key::after { content: '?'; color: var(--text-light); position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); font-size: 12px; }
.self-test-mode .key.revealed { color: var(--danger) !important; background: #fef2f2; }
.self-test-mode .key.revealed::after { display: none; }

/* Question Section */
.section-select { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.section-select button { padding: 8px 16px; border: 2px solid var(--border); border-radius: 20px; background: var(--card); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all .2s; }
.section-select button.active { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.section-select button:hover:not(.active) { border-color: #cbd5e1; }

.q-card { padding: 16px; border-bottom: 1px solid var(--border); }
.q-card:last-child { border-bottom: none; }
.q-number { font-size: 12px; color: var(--primary); font-weight: 700; margin-bottom: 8px; }
.q-text { font-size: 15px; line-height: 1.7; margin-bottom: 12px; }
.q-options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.q-option { padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all .15s; line-height: 1.5; }
.q-option:hover { border-color: #94a3b8; }
.q-option.selected { border-color: var(--primary); background: var(--primary-light); }
.q-option.correct { border-color: var(--success); background: #f0fdf4; }
.q-option.wrong { border-color: var(--danger); background: #fef2f2; }
.q-option.show-correct { border-color: var(--success); background: #f0fdf4; }

.q-answer { font-size: 13px; padding: 12px; border-radius: 8px; margin-top: 8px; display: none; line-height: 1.6; }
.q-answer.show { display: block; }
.q-answer .label { font-weight: 700; }
.q-answer.correct-ans { background: #f0fdf4; border: 1px solid #bbf7d0; }
.q-answer.wrong-ans { background: #fef2f2; border: 1px solid #fecaca; }

.q-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.q-actions button { padding: 6px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-check { background: var(--primary); color: white; }
.btn-check:hover { opacity: .9; }
.btn-show-answer { background: #f1f5f9; color: var(--text); }
.btn-show-answer:hover { background: #e2e8f0; }
.btn-correct { background: var(--success); color: white; }
.btn-wrong { background: var(--danger); color: white; }
.btn-next { background: var(--warning); color: white; }
.btn-add-wrong { background: #fff; color: var(--danger); border: 1.5px solid var(--danger) !important; }
.btn-add-wrong:hover { background: var(--wrong-bg); }
.btn-added-wrong { background: var(--success); color: white; opacity: .7; cursor: default !important; }

.fill-group { margin-bottom: 16px; }
.fill-group h4 { font-size: 14px; color: var(--text-light); margin-bottom: 8px; }
.fill-blank { display: inline-block; min-width: 60px; border: none; border-bottom: 2px solid #cbd5e1; padding: 2px 6px; font-size: 14px; outline: none; transition: border-color .2s; font-family: inherit; }
.fill-blank:focus { border-bottom-color: var(--primary); }
.fill-blank.correct { border-bottom-color: var(--success); background: #f0fdf4; }
.fill-blank.wrong { border-bottom-color: var(--danger); background: #fef2f2; }
.fill-blank:disabled { opacity: .8; }

/* Quiz Mode */
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
.quiz-stats { display: flex; gap: 16px; font-size: 14px; }
.quiz-stats span { font-weight: 600; }
.quiz-progress { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.quiz-progress-bar { height: 100%; background: var(--primary); transition: width .3s; border-radius: 2px; }
.quiz-result { text-align: center; padding: 40px 20px; }
.quiz-result .score { font-size: 48px; font-weight: 800; color: var(--primary); }
.quiz-result .detail { color: var(--text-light); margin-top: 8px; font-size: 16px; }
.quiz-result .stars { font-size: 32px; margin-top: 12px; }

/* New Questions */
.new-q-section { text-align: center; padding: 20px; }
.new-q-section p { color: var(--text-light); font-size: 14px; margin-bottom: 16px; }
.generate-btn { padding: 12px 32px; border: none; border-radius: var(--radius); background: var(--primary); color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .15s; }
.generate-btn:hover { opacity: .9; transform: translateY(-1px); }
.generate-btn.small { padding: 8px 20px; font-size: 13px; }

/* Fill Blank Check Buttons */
.fill-check-area { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }

/* Search */
.search-box { width: 100%; padding: 10px 16px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 12px; font-family: inherit; }
.search-box:focus { border-color: var(--primary); }

/* Wrong Questions */
.wrong-card { padding: 16px; border-bottom: 1px solid var(--border); border-left: 4px solid var(--danger); }
.wrong-card:last-child { border-bottom: none; }
.wrong-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 12px; margin-bottom: 8px; }
.wrong-meta .w-tag { padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.wrong-meta .w-date { color: var(--text-light); }
.w-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.btn-forget { background: var(--success); color: white; }
.btn-forget:hover { opacity: .9; }
.btn-retry-wrong { background: var(--primary); color: white; }
.btn-retry-wrong:hover { opacity: .9; }
.wrong-empty { text-align: center; padding: 40px 20px; color: var(--text-light); }
.wrong-empty .big { font-size: 48px; margin-bottom: 12px; }

/* Wrong Quiz Mode */
.wrong-quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
.wrong-quiz-progress { font-size: 13px; color: var(--text-light); }

/* Responsive */
@media (max-width: 600px) {
  header { padding: 14px 16px; }
  header h1 { font-size: 18px; }
  nav button { font-size: 12px; padding: 10px 4px; min-width: 50px; }
  main { padding: 12px; }
  .q-text { font-size: 14px; }
}

/* Tag badges */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-right: 4px; }
.tag-8088 { background: #dbeafe; color: #1d4ed8; }
.tag-8259 { background: #fce7f3; color: #be185d; }
.tag-8253 { background: #d1fae5; color: #047857; }
.tag-8255 { background: #fef3c7; color: #b45309; }
.tag-asm { background: #ede9fe; color: #6d28d9; }
.tag-mem { background: #ffedd5; color: #c2410c; }
.tag-int { background: #ccfbf1; color: #0f766e; }
.tag-com { background: #fce4ec; color: #c62828; }
.tag-wrong { background: var(--wrong-bg); color: var(--danger); }
.tag-fill { background: #e0e7ff; color: #4338ca; }
.tag-choice { background: #dbeafe; color: #1d4ed8; }
.tag-tf { background: #fce7f3; color: #be185d; }
.tag-prog { background: #d1fae5; color: #047857; }
</style>
</head>
<body>

<header>
  <h1>微机原理复习宝典</h1>
  <p>8088 · 8259A · 8253 · 8255 · 汇编 · 存储器</p>
</header>

<nav id="mainNav">
  <button class="active" data-tab="notes">📖 笔记</button>
  <button data-tab="practice">✏️ 刷题</button>
  <button data-tab="quiz">🎯 考试</button>
  <button data-tab="newq">🆕 新题</button>
  <button data-tab="wrong">❌ 错题 <span class="badge" id="wrongBadge">0</span></button>
</nav>

<main id="tabNotes" class="active">
  <div class="tab-header">
    <h2>📖 笔记背诵</h2>
    <p>考试重点速记，展开知识点开始背诵</p>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
      <button id="notesSelfTestBtn" class="btn-show-answer" onclick="toggleNotesSelfTest()" style="padding:6px 16px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;">🔍 挂空自测</button>
      <span id="selfTestProgress" style="font-size:12px;color:var(--text-light);display:none;align-self:center;"></span>
    </div>
  </div>
  <div class="search-box-wrap">
    <input class="search-box" id="notesSearch" placeholder="搜索笔记关键词..." oninput="filterNotes()">
  </div>
  <div id="notesContainer"></div>
</main>

<main id="tabPractice">
  <div class="tab-header">
    <h2>✏️ 刷题模式</h2>
    <p>按题型练习，答错的题自动加入错题本</p>
  </div>
  <div class="section-select" id="practiceNav"></div>
  <div id="practiceContainer"></div>
</main>

<main id="tabQuiz">
  <div class="tab-header">
    <h2>🎯 模拟考试</h2>
    <p>随机抽题，计时答题，答错的自动记入错题本</p>
  </div>
  <div id="quizSetup">
    <div class="card" style="padding:20px;text-align:center;">
      <p style="margin-bottom:16px;color:var(--text-light);">选择题目数量和类型开始模拟考试</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;">
        <label style="font-size:14px;"><input type="checkbox" id="qzFill" checked> 填空</label>
        <label style="font-size:14px;"><input type="checkbox" id="qzChoice" checked> 选择</label>
        <label style="font-size:14px;"><input type="checkbox" id="qzTF" checked> 判断</label>
        <label style="font-size:14px;"><input type="checkbox" id="qzProg" checked> 编程</label>
      </div>
      <div style="margin-bottom:16px;">
        <button onclick="setQuizCount(5)" class="section-select-btn" id="qc5" style="padding:8px 20px;border:2px solid var(--border);border-radius:20px;background:var(--primary-light);font-weight:600;cursor:pointer;margin:4px;">5题</button>
        <button onclick="setQuizCount(10)" class="section-select-btn" id="qc10" style="padding:8px 20px;border:2px solid var(--border);border-radius:20px;background:var(--primary-light);font-weight:600;cursor:pointer;margin:4px;">10题</button>
        <button onclick="setQuizCount(20)" class="section-select-btn" id="qc20" style="padding:8px 20px;border:2px solid var(--border);border-radius:20px;font-weight:600;cursor:pointer;margin:4px;">20题</button>
      </div>
      <button onclick="startQuiz()" style="padding:12px 40px;border:none;border-radius:var(--radius);background:var(--primary);color:white;font-size:16px;font-weight:700;cursor:pointer;">开始考试</button>
    </div>
  </div>
  <div id="quizArea" style="display:none;"></div>
</main>

<main id="tabNewq">
  <div class="tab-header">
    <h2>🆕 新题生成</h2>
    <p>同类型变体题目，巩固薄弱环节</p>
  </div>
  <div class="new-q-section card">
    <p>基于已掌握的知识点，生成新的练习题。</p>
    <p style="font-size:13px;margin-bottom:16px;">可选择生成类型：</p>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;">
      <button onclick="selectGenType('random')" class="section-select-btn" id="gt-random" style="padding:8px 16px;border:2px solid var(--primary);border-radius:20px;background:var(--primary-light);font-weight:600;cursor:pointer;">全部随机</button>
      <button onclick="selectGenType('choice')" class="section-select-btn" id="gt-choice" style="padding:8px 16px;border:2px solid var(--border);border-radius:20px;font-weight:600;cursor:pointer;">选择题</button>
      <button onclick="selectGenType('fill')" class="section-select-btn" id="gt-fill" style="padding:8px 16px;border:2px solid var(--border);border-radius:20px;font-weight:600;cursor:pointer;">填空题</button>
      <button onclick="selectGenType('tf')" class="section-select-btn" id="gt-tf" style="padding:8px 16px;border:2px solid var(--border);border-radius:20px;font-weight:600;cursor:pointer;">判断题</button>
      <button onclick="selectGenType('prog')" class="section-select-btn" id="gt-prog" style="padding:8px 16px;border:2px solid var(--border);border-radius:20px;font-weight:600;cursor:pointer;">编程题</button>
    </div>
    <button onclick="generateNewQuestions()" class="generate-btn">🔨 生成新题</button>
  </div>
  <div id="newQuestionsContainer"></div>
</main>

<main id="tabWrong">
  <div class="tab-header">
    <h2>❌ 错题本</h2>
    <p>答错的题都在这里，集中攻克薄弱环节</p>
  </div>
  <div id="wrongStats" style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
    <span style="font-size:13px;color:var(--text-light);" id="wrongCountDisplay">共 0 道错题</span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
    <button onclick="startWrongQuiz()" class="generate-btn small" id="wrongQuizBtn" style="display:none;">🎯 错题重练</button>
    <button onclick="clearAllWrong()" class="btn-show-answer" style="padding:8px 20px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;border:1px solid var(--danger);color:var(--danger);background:#fff;">🗑️ 清空错题本</button>
  </div>
  <div id="wrongContainer"></div>
  <div id="wrongQuizArea" style="display:none;"></div>
</main>

<script>
// ============================================================
// DATA: Notes
// ============================================================
const NOTES = [
  { id: "cpu", icon: "🖥️", color: "#dbeafe", title: "8088 CPU 体系结构",
    content: `
<h3>基本特性</h3>
<ul>
  <li><span class="key">16位</span>微处理器，<span class="key">8位</span>外部数据总线</li>
  <li><span class="key">20根</span>地址线（A19~A0），寻址空间 <span class="key">1MB</span>（2²⁰B）</li>
  <li>采用<span class="key">分段管理</span>方式，每段最大 <span class="key">64KB</span></li>
</ul>
<h3>内部结构</h3>
<ul>
  <li><span class="key">BIU</span>（总线接口部件）：负责指令预取、总线控制</li>
  <li><span class="key">EU</span>（执行部件）：负责指令译码和执行</li>
</ul>
<h3>物理地址计算</h3>
<p>物理地址 = <span class="key">段地址 × 16 + 偏移地址</span></p>
<p>例：CS=1000H，IP=0200H → 物理地址 = 10000H + 0200H = <span class="key">10200H</span></p>
<h3>内部寄存器（14个16位）</h3>
<ul>
  <li><b>通用寄存器</b>：AX（累加器）、BX（基址）、CX（计数）、DX（数据），均可拆成H/L两个8位</li>
  <li><b>指针/变址</b>：SP（栈顶）、BP（基址→SS）、SI（源变址→DS）、DI（目的变址→DS）</li>
  <li><b>段寄存器</b>：CS（代码段）、DS（数据段）、SS（堆栈段）、ES（附加段）</li>
  <li><b>控制</b>：IP（指令指针）、FLAGS（标志寄存器）</li>
</ul>
<h3>重要引脚</h3>
<ul>
  <li><span class="key">INTR</span>：可屏蔽中断请求（受IF控制）</li>
  <li><span class="key">NMI</span>：非屏蔽中断请求（不受IF控制）</li>
  <li><span class="key">RD</span>/<span class="key">WR</span>：读写控制信号（均为<span class="key">输出</span>）</li>
  <li>地址线20根（不是24根！），数据线8位（不是16位！）</li>
</ul>
<h3>堆栈操作</h3>
<ul>
  <li>每次操作<span class="key">16位</span>（一个字），<span class="key">后进先出</span></li>
  <li>PUSH：SP ← SP-2，再写入；POP：先读出，SP ← SP+2</li>
  <li>默认段寄存器：<span class="key">SS</span></li>
</ul>
<h3>标志寄存器 FLAGS</h3>
<ul>
  <li><b>状态标志</b>：CF（进位）、PF（奇偶）、AF（辅助进位）、ZF（零）、SF（符号）、OF（溢出）</li>
  <li><b>控制标志</b>：IF（中断允许）、DF（方向）、TF（单步）</li>
  <li>逻辑运算（AND/OR/XOR/TEST）执行后 <span class="key">CF=OF=0</span></li>
</ul>
<h3>常见指令</h3>
<ul>
  <li><span class="code">MOV 目的, 源</span>：不能两个操作数同时为内存</li>
  <li><span class="code">MOV DS, 1234H</span>：<span class="key">非法</span>！段寄存器不能直接接收立即数</li>
  <li><span class="code">CMP 目的, 源</span>：执行减法<span class="key">但不修改操作数</span>，只影响标志位</li>

// Wrong questions state (persisted in localStorage)
let wrongQuestions = [];

let notesSelfTestOn = false;

// Load wrong questions from localStorage
function loadWrongQuestions() {
  try {
    const data = localStorage.getItem('mc_wrong_questions');
    if (data) wrongQuestions = JSON.parse(data);
  } catch(e) { wrongQuestions = []; }
  updateWrongBadge();
}

function saveWrongQuestions() {
  try {
    localStorage.setItem('mc_wrong_questions', JSON.stringify(wrongQuestions));
  } catch(e) {}
  updateWrongBadge();
}

function updateWrongBadge() {
  const badge = document.getElementById('wrongBadge');
  if (badge) badge.textContent = wrongQuestions.length;
  const countDisplay = document.getElementById('wrongCountDisplay');
  if (countDisplay) countDisplay.textContent = `共 ${wrongQuestions.length} 道错题`;
  const quizBtn = document.getElementById('wrongQuizBtn');
  if (quizBtn) quizBtn.style.display = wrongQuestions.length > 0 ? 'inline-block' : 'none';
}

// ============================================================
// WRONG QUESTIONS
// ============================================================
function addToWrong(q) {
  // Check duplicates by id
  if (q.id && wrongQuestions.some(w => w.id === q.id)) return;
  wrongQuestions.push({ ...q, addedAt: Date.now() });
  saveWrongQuestions();
}

function removeFromWrong(id) {
  wrongQuestions = wrongQuestions.filter(w => w.id !== id);
  saveWrongQuestions();
  renderWrongQuestions();
}

function clearAllWrong() {
  if (wrongQuestions.length === 0) return;
  if (!confirm('确定清空所有错题吗？')) return;
  wrongQuestions = [];
  saveWrongQuestions();
  renderWrongQuestions();
}

function getQuestionTypeLabel(q) {
  if (q.type === 'fill') return '填空';
  if (q.type === 'choice') return '选择';
  if (q.type === 'tf') return '判断';
  return '简答/编程';
}

function getQuestionTypeTag(q) {
  if (q.type === 'fill') return 'fill';
  if (q.type === 'choice') return 'choice';
  if (q.type === 'tf') return 'tf';
  return 'prog';
}

function renderWrongQuestions() {
  const container = document.getElementById('wrongContainer');
  const quizBtn = document.getElementById('wrongQuizBtn');

  if (wrongQuestions.length === 0) {
    container.innerHTML = '<div class="card wrong-empty"><div class="big">🎉</div><p>暂无错题，继续保持！</p></div>';
    if (quizBtn) quizBtn.style.display = 'none';
    return;
  }

  if (quizBtn) quizBtn.style.display = 'inline-block';

  container.innerHTML = wrongQuestions.map((q, i) => {
    const qText = q.question || (q.text || '');
    const tagClass = getQuestionTypeTag(q);

    return `<div class="wrong-card">
      <div class="wrong-meta">
        <span class="w-tag tag-${tagClass}">${getQuestionTypeLabel(q)}</span>
        ${q.tag ? `<span class="w-tag tag-${q.tag}">${q.tag}</span>` : ''}
        <span class="w-date">${new Date(q.addedAt).toLocaleDateString('zh-CN')}</span>
      </div>
      <div class="q-text" style="font-size:14px;margin-bottom:4px;">${qText.substring(0, 120)}${qText.length > 120 ? '...' : ''}</div>
      ${q.explanation ? `<div class="q-answer show correct-ans" style="font-size:12px;margin-top:4px;">${q.explanation}</div>` : ''}
      <div class="w-actions">
        <button class="btn-forget" onclick="forgetWrong(${i})">✅ 已掌握</button>
        <button class="btn-forget" onclick="removeFromWrong('${q.id}')" style="background:var(--text-light);">🗑️ 移除</button>
      </div>
    </div>`;
  }).join('');
}

function forgetWrong(idx) {
  // Move to end as "reviewed" - actually just remove
  removeFromWrong(wrongQuestions[idx].id);
}

// ============================================================
// WRONG QUIZ (retry wrong questions)
// ============================================================
let wrongQuizActive = false;
let wrongQuizQuestions = [];
let wrongQuizIndex = 0;
let wrongQuizScore = 0;

function startWrongQuiz() {
  if (wrongQuestions.length === 0) { alert('暂无错题！'); return; }

  wrongQuizActive = true;
  wrongQuizQuestions = [...wrongQuestions].sort(() => Math.random() - 0.5);
  wrongQuizIndex = 0;
  wrongQuizScore = 0;

  document.getElementById('wrongContainer').style.display = 'none';
  document.getElementById('wrongQuizBtn').style.display = 'none';
  document.getElementById('wrongQuizArea').style.display = 'block';

  renderWrongQuizQuestion();
}

function renderWrongQuizQuestion() {
  const area = document.getElementById('wrongQuizArea');
  if (wrongQuizIndex >= wrongQuizQuestions.length) {
    showWrongQuizResult();
    return;
  }

  const q = wrongQuizQuestions[wrongQuizIndex];
  const total = wrongQuizQuestions.length;
  const pct = wrongQuizIndex / total * 100;

  let html = `
    <div class="wrong-quiz-header">
      <span class="wrong-quiz-progress">错题重练 · 第 ${wrongQuizIndex+1}/${total} 题</span>
      <span style="font-size:13px;color:var(--success);font-weight:600;">✓ ${wrongQuizScore}</span>
    </div>
    <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${pct}%"></div></div>
  `;

  html += `<div class="card"><div class="q-card">
    <div class="q-number">${getQuestionTypeLabel(q)} <span class="tag tag-${q.tag||'asm'}">${q.tag||''}</span></div>
    <div class="q-text">${q.question || q.text || ''}</div>`;

  if (q.type === 'choice' && q.options) {
    html += `<div class="q-options" id="wqzOpts">
      ${q.options.map((o, oi) => `<div class="q-option" data-wqz="${oi}" onclick="wqzSelectChoice(${oi})">${o}</div>`).join('')}
    </div>
    <div style="margin-bottom:8px;"><button class="btn-check" onclick="wqzSubmitChoice()">提交</button></div>
    <div class="q-answer" id="wqzResult">${q.explanation ? `<span class="label">解析：</span>${q.explanation}` : ''}</div>`;
  } else if (q.type === 'tf') {
    html += `<div class="q-options">
      <div class="q-option" data-wqzf="true" onclick="wqzSelectTF(true)">✓ 正确</div>
      <div class="q-option" data-wqzf="false" onclick="wqzSelectTF(false)">✗ 错误</div>
    </div>
    <div style="margin-bottom:8px;"><button class="btn-check" onclick="wqzSubmitTF()">提交</button></div>
    <div class="q-answer" id="wqzResult">${q.explanation ? `<span class="label">解析：</span>${q.explanation}` : ''}</div>`;
  } else {
    html += `<div style="margin-bottom:8px;"><button class="btn-show-answer" onclick="document.getElementById('wqzResult').classList.toggle('show')">显示答案</button></div>
    <div class="q-answer correct-ans" id="wqzResult">${q.answer || q.explanation || ''}</div>
    <div style="display:flex;gap:8px;">
      <button class="btn-correct" onclick="wqzNext(true)">✓ 答对了</button>
      <button class="btn-wrong" onclick="wqzNext(false)">✗ 还是不会</button>
    </div>`;
  }

  html += `</div></div>
    <div style="margin-top:8px;">
      <button class="btn-show-answer" onclick="endWrongQuiz()" style="font-size:12px;">退出重练</button>
    </div>`;

  area.innerHTML = html;
}

let wqzChoice = null;
let wqzTF = null;

function wqzSelectChoice(oi) {
  document.querySelectorAll('[data-wqz]').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`[data-wqz="${oi}"]`);
  if (el) el.classList.add('selected');
  wqzChoice = oi;
}

function wqzSubmitChoice() {
  const q = wrongQuizQuestions[wrongQuizIndex];
  if (wqzChoice === null) { alert('请先选择！'); return; }
  const correct = wqzChoice === q.answer;
  document.querySelectorAll('[data-wqz]').forEach(el => {
    const oi = parseInt(el.dataset.wqz);
    el.classList.remove('correct', 'wrong');
    if (oi === wqzChoice) el.classList.add(correct ? 'correct' : 'wrong');
    if (oi === q.answer && wqzChoice !== q.answer) el.classList.add('correct');
    el.style.pointerEvents = 'none';
  });
  const result = document.getElementById('wqzResult');
  result.classList.add('show');
  result.classList.add(correct ? 'correct-ans' : 'wrong-ans');
  // If answered correctly, remove from wrong
  if (correct) {
    removeFromWrong(q.id);
    result.innerHTML = '<span class="label">✅ 回答正确！已从错题本移除</span>';
  } else {
    result.innerHTML = `<span class="label">❌ 再想想</span><br>${q.explanation || ''}`;
  }
  setTimeout(() => wqzNext(correct), 1500);
}

function wqzSelectTF(val) {
  document.querySelectorAll('[data-wqzf]').forEach(el => el.classList.remove('selected'));
  document.querySelector(`[data-wqzf="${val}"]`).classList.add('selected');
  wqzTF = val;
}

function wqzSubmitTF() {
  const q = wrongQuizQuestions[wrongQuizIndex];
  if (wqzTF === null) { alert('请先选择！'); return; }
  const val = wqzTF === 'true';
  const correct = val === q.answer;
  document.querySelectorAll('[data-wqzf]').forEach(el => {
    const v = el.dataset.wqzf === 'true';
    el.classList.remove('correct', 'wrong');
    if (v === val) el.classList.add(correct ? 'correct' : 'wrong');
    if (v === q.answer && val !== q.answer) el.classList.add('correct');
    el.style.pointerEvents = 'none';
  });
  const result = document.getElementById('wqzResult');
  result.classList.add('show');
  result.classList.add(correct ? 'correct-ans' : 'wrong-ans');
  if (correct) {
    removeFromWrong(q.id);
    result.innerHTML = '<span class="label">✅ 正确！已从错题本移除</span>';
  } else {
    result.innerHTML = `<span class="label">❌ 错误</span><br>${q.explanation || ''}`;
  }
  setTimeout(() => wqzNext(correct), 1500);
}

function wqzNext(correct) {
  if (correct) wrongQuizScore++;
  wrongQuizIndex++;
  wqzChoice = null;
  wqzTF = null;
  renderWrongQuizQuestion();
}

function showWrongQuizResult() {
  const total = wrongQuizQuestions.length;
  const pct = Math.round(wrongQuizScore / total * 100);
  document.getElementById('wrongQuizArea').innerHTML = `
    <div class="card quiz-result">
      <div class="score">${pct}%</div>
      <div class="detail">${wrongQuizScore}/${total} 题回答正确</div>
      <div class="stars" style="margin-top:8px;font-size:14px;color:var(--text-light);">
        已掌握 ${wrongQuizScore} 题，移除出错题本
      </div>
      <div style="margin-top:24px;">
        <button class="generate-btn" onclick="endWrongQuiz()">完成</button>
      </div>
    </div>
  `;
}

function endWrongQuiz() {
  wrongQuizActive = false;
  document.getElementById('wrongContainer').style.display = 'block';
  document.getElementById('wrongQuizArea').style.display = 'none';
  document.getElementById('wrongQuizBtn').style.display = wrongQuestions.length > 0 ? 'inline-block' : 'none';
  renderWrongQuestions();
}

function toggleTopic(id) {
  const content = document.getElementById('topic_' + id);
  const btn = content.previousElementSibling;
  content.classList.toggle('open');
  btn.classList.toggle('open');
  if (notesSelfTestOn) updateSelfTestProgress();
}

function filterNotes() {
  const q = document.getElementById('notesSearch').value.toLowerCase();
  document.querySelectorAll('.topic-btn').forEach(btn => {
    const card = btn.closest('.card');
    if (!q) { card.style.display = ''; return; }
    const text = btn.textContent.toLowerCase() + card.querySelector('.topic-inner').textContent.toLowerCase();
    card.style.display = text.includes(q) ? '' : 'none';

// ============================================================
// NOTES SELF-TEST
// ============================================================
function toggleNotesSelfTest() {
  notesSelfTestOn = !notesSelfTestOn;
  const btn = document.getElementById('notesSelfTestBtn');
  const progress = document.getElementById('selfTestProgress');

  if (notesSelfTestOn) {
    btn.textContent = '📖 退出自测';
    btn.style.background = 'var(--primary)';
    btn.style.color = 'white';
    progress.style.display = 'inline-block';
    // Add self-test class to all note containers
    document.querySelectorAll('.topic-inner').forEach(el => el.classList.add('self-test-mode'));
    // Make .key elements clickable to reveal
    document.querySelectorAll('.topic-inner .key').forEach(el => {
      el.style.cursor = 'pointer';
      el.onclick = function() { this.classList.toggle('revealed'); updateSelfTestProgress(); };
    });
    // Expand all topics in self-test mode
    document.querySelectorAll('.topic-content').forEach(el => {
      if (!el.classList.contains('open')) {
        el.classList.add('open');
        el.previousElementSibling.classList.add('open');
      }
    });
    updateSelfTestProgress();
  } else {
    btn.textContent = '🔍 挂空自测';
    btn.style.background = '';
    btn.style.color = '';
    progress.style.display = 'none';
    document.querySelectorAll('.topic-inner').forEach(el => el.classList.remove('self-test-mode'));
    document.querySelectorAll('.topic-inner .key').forEach(el => {
      el.classList.remove('revealed');
      el.style.cursor = '';
      el.onclick = null;
    });
  }
}

function updateSelfTestProgress() {
  const allKeys = document.querySelectorAll('.topic-inner.open .key, .topic-content.open .key');
  // Fallback: if no .open context, count all visible keys
  let visibleKeys = [];
  if (notesSelfTestOn) {
    visibleKeys = document.querySelectorAll('.self-test-mode .key');
  } else {
    visibleKeys = allKeys;
  }
  const revealed = document.querySelectorAll('.self-test-mode .key.revealed');
  const total = visibleKeys.length;
  const done = revealed.length;
  const progress = document.getElementById('selfTestProgress');
  if (progress) {
    progress.textContent = total > 0 ? `✅ ${done}/${total} 已掌握` : '加载中...';
  }
}

function renderFillBlank(group, gi) {
  return `<div class="fill-group">
    <h4>${group.title}</h4>
    ${group.items.map((item, qi) => {
      const fbId = `fb_${gi}_${qi}`;
      let html = `<div class="q-card"><div class="q-number">${gi+1}.${qi+1}</div><div class="q-text">`;
      let idx = 0;
      const segments = item.text.split(/(_{4,})/g);
      segments.forEach(seg => {
        if (/_{4,}/.test(seg) && idx < item.blanks.length) {
          html += `<input class="fill-blank" id="${fbId}_b${idx}" data-answer="${item.blanks[idx]}" data-g="${gi}" data-q="${qi}" data-bi="${idx}" onkeydown="if(event.key==='Enter')checkFillBlanks(${gi},${qi})">`;
          idx++;
        } else {
          html += seg;
        }
      });
      const fillId = `fb_${gi}_${qi}`;
      html += `</div>
        <div class="fill-check-area">
          <button class="btn-check" onclick="checkFillBlanks(${gi},${qi})">检查</button>
          <button class="btn-show-answer" onclick="showFillAnswer(${gi},${qi})">显示答案</button>
          <button class="btn-add-wrong" onclick="addFillToWrong(${gi},${qi})" id="fb_add_${gi}_${qi}">+ 错题本</button>
        </div>
        <div class="q-answer" id="fb_ans_${gi}_${qi}">
          <span class="label">答案：</span>${item.blanks.join('、')}
        </div>
      </div>`;
      return html;
    }).join('')}
  </div>`;
}

function checkFillBlanks(gi, qi) {
  const group = QUESTIONS.fillBlank.groups[gi];
  const item = group.items[qi];
  let allCorrect = true;
  item.blanks.forEach((ans, bi) => {
    const input = document.getElementById(`fb_${gi}_${qi}_b${bi}`);
    if (!input) return;
    const val = input.value.trim();
    input.classList.remove('correct', 'wrong');
    if (val === ans) {
      input.classList.add('correct');
    } else {
      input.classList.add('wrong');
      allCorrect = false;
    }
  });
  const ansDiv = document.getElementById(`fb_ans_${gi}_${qi}`);
  ansDiv.classList.add('show');
  ansDiv.classList.remove('correct-ans', 'wrong-ans');
  ansDiv.classList.add(allCorrect ? 'correct-ans' : 'wrong-ans');
  if (!allCorrect) {
    addToWrong({ id: `fb_${gi}_${qi}`, type: 'fill', question: `[${group.title}] ${item.text.replace(/_{4,}/g, '____')}`, tag: group.tag, explanation: `答案：${item.blanks.join('、')}` });
    const btn = document.getElementById(`fb_add_${gi}_${qi}`);
    if (btn) { btn.textContent = '✓ 已加入'; btn.classList.add('btn-added-wrong'); }
  }
}

function showFillAnswer(gi, qi) {
  const group = QUESTIONS.fillBlank.groups[gi];
  const item = group.items[qi];
  item.blanks.forEach((ans, bi) => {
    const input = document.getElementById(`fb_${gi}_${qi}_b${bi}`);
    if (input) {
      input.value = ans;
      input.classList.add('correct');
      input.disabled = true;
    }
  });
  const ansDiv = document.getElementById(`fb_ans_${gi}_${qi}`);
  ansDiv.classList.add('show');
  ansDiv.classList.add('correct-ans');
}

function addFillToWrong(gi, qi) {
  const group = QUESTIONS.fillBlank.groups[gi];
  const item = group.items[qi];
  addToWrong({ id: `fb_${gi}_${qi}`, type: 'fill', question: `[${group.title}] ${item.text.replace(/_{4,}/g, '____')}`, tag: group.tag, explanation: `答案：${item.blanks.join('、')}` });
  const btn = document.getElementById(`fb_add_${gi}_${qi}`);
  if (btn) { btn.textContent = '✓ 已加入'; btn.classList.add('btn-added-wrong'); }
}

function renderChoices(section) {
  const s = QUESTIONS[section];
  if (!s) return '';
  if (section === 'fillBlank') {
    return s.groups.map((g, gi) => renderFillBlank(g, gi)).join('');
  }
  const items = s;
  if (!items) return '';

  return items.map((q, i) => {
    const idx = i + 1;
    if (section === 'shortAnswer' || section === 'programming' || section === 'comprehensive') {
      return `<div class="q-card">
        <div class="q-number">${idx}. <span class="tag tag-${q.tag}">${q.tag}</span></div>
        <div class="q-text">${q.question}</div>
        <div class="q-actions">
          <button class="btn-show-answer" onclick="toggleShortAns('${section}_${i}')">显示答案</button>
          <button class="btn-add-wrong" onclick="addSimpleToWrong('${q.id}','${section}')" id="add_${q.id}">+ 错题本</button>
        </div>
        <div class="q-answer correct-ans" id="ans_${section}_${i}">${q.answer}</div>
      </div>`;
    }
    if (section === 'trueFalse') {
      return `<div class="q-card">
        <div class="q-number">${idx}. <span class="tag tag-${q.tag}">${q.tag}</span></div>
        <div class="q-text">${q.question}</div>
        <div class="q-options">
          <div class="q-option" data-tf="${i}" data-val="true" onclick="selectTF(${i},true)">✓ 正确</div>
          <div class="q-option" data-tf="${i}" data-val="false" onclick="selectTF(${i},false)">✗ 错误</div>
        </div>
        <div class="q-actions">
          <button class="btn-check" onclick="checkTF(${i})">检查</button>
          <button class="btn-add-wrong" onclick="addTFToWrong(${i})" id="add_tf_${i}">+ 错题本</button>
        </div>
        <div class="q-answer" id="tf_ans_${i}"><span class="label">解析：</span>${q.explanation}</div>
      </div>`;
    }
    return `<div class="q-card">
      <div class="q-number">${idx}. <span class="tag tag-${q.tag}">${q.tag}</span></div>
      <div class="q-text">${q.question}</div>
      <div class="q-options">
        ${q.options.map((o, oi) => `<div class="q-option" data-choice="${i}" data-oi="${oi}" onclick="selectChoice(${i},${oi})">${o}</div>`).join('')}
      </div>
      <div class="q-actions">
        <button class="btn-check" onclick="checkChoice(${i})">检查</button>
        <button class="btn-add-wrong" onclick="addChoiceToWrong(${i})" id="add_c${i}">+ 错题本</button>
      </div>
      <div class="q-answer" id="choice_ans_${i}"><span class="label">解析：</span>${q.explanation}</div>
    </div>`;
  }).join('');
}

// ============================================================
// PRACTICE - Choice interactions
// ============================================================
let selectedChoice = {};
let selectedTF = {};

function selectChoice(i, oi) {
  document.querySelectorAll(`[data-choice="${i}"]`).forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`[data-choice="${i}"][data-oi="${oi}"]`);
  if (el) el.classList.add('selected');
  selectedChoice[i] = oi;
}

function checkChoice(i) {
  const q = QUESTIONS.choice[i];
  const sel = selectedChoice[i];
  document.querySelectorAll(`[data-choice="${i}"]`).forEach(el => {
    const oi = parseInt(el.dataset.oi);
    el.classList.remove('correct', 'wrong', 'show-correct');
    if (oi === sel) el.classList.add(oi === q.answer ? 'correct' : 'wrong');
    if (oi === q.answer && sel !== q.answer) el.classList.add('show-correct');
  });
  const ans = document.getElementById('choice_ans_' + i);
  ans.classList.add('show');
  if (sel === q.answer) { ans.classList.remove('wrong-ans'); ans.classList.add('correct-ans'); }
  else {
    ans.classList.remove('correct-ans'); ans.classList.add('wrong-ans');
    addToWrong({ id: q.id, type: 'choice', question: q.question, tag: q.tag, explanation: q.explanation, answer: q.answer });
    const btn = document.getElementById('add_c' + i);
    if (btn) { btn.textContent = '✓ 已加入'; btn.classList.add('btn-added-wrong'); }
  }
}

function addChoiceToWrong(i) {
  const q = QUESTIONS.choice[i];
  addToWrong({ id: q.id, type: 'choice', question: q.question, tag: q.tag, explanation: q.explanation, answer: q.answer });
  const btn = document.getElementById('add_c' + i);
  if (btn) { btn.textContent = '✓ 已加入'; btn.classList.add('btn-added-wrong'); }
}

function selectTF(i, val) {
  document.querySelectorAll(`[data-tf="${i}"]`).forEach(el => el.classList.remove('selected'));
  document.querySelector(`[data-tf="${i}"][data-val="${val}"]`).classList.add('selected');
  selectedTF[i] = val;
}

function checkTF(i) {
  const q = QUESTIONS.trueFalse[i];
  const sel = selectedTF[i] === 'true';
  document.querySelectorAll(`[data-tf="${i}"]`).forEach(el => {
    const v = el.dataset.val === 'true';
    el.classList.remove('correct', 'wrong');
    if (v === sel) el.classList.add(v === q.answer ? 'correct' : 'wrong');
    if (v === q.answer && sel !== q.answer) el.classList.add('correct');
  });
  const ans = document.getElementById('tf_ans_' + i);
  ans.classList.add('show');
  if (sel === q.answer) { ans.classList.remove('wrong-ans'); ans.classList.add('correct-ans'); }
  else {
    ans.classList.remove('correct-ans'); ans.classList.add('wrong-ans');
    addToWrong({ id: q.id, type: 'tf', question: q.question, tag: q.tag, explanation: q.explanation, answer: q.answer });
    const btn = document.getElementById('add_tf_' + i);
    if (btn) { btn.textContent = '✓ 已加入'; btn.classList.add('btn-added-wrong'); }
  }
}

function addTFToWrong(i) {
  const q = QUESTIONS.trueFalse[i];
  addToWrong({ id: q.id, type: 'tf', question: q.question, tag: q.tag, explanation: q.explanation, answer: q.answer });
  const btn = document.getElementById('add_tf_' + i);
  if (btn) { btn.textContent = '✓ 已加入'; btn.classList.add('btn-added-wrong'); }
}

function addSimpleToWrong(id, section) {
  const q = QUESTIONS[section].find(x => x.id === id);
  if (!q) return;
  addToWrong({ id: q.id, type: 'prog', question: q.question, tag: q.tag, explanation: q.answer });
  const btn = document.getElementById('add_' + id);
  if (btn) { btn.textContent = '✓ 已加入'; btn.classList.add('btn-added-wrong'); }
}

function toggleShortAns(id) {
  const el = document.getElementById('ans_' + id);
  el.classList.toggle('show');
}

// ============================================================
// PRACTICE - Section switching
// ============================================================
const SECTIONS = [
  { key: 'fillBlank', label: '填空题' },
  { key: 'choice', label: '选择题' },
  { key: 'trueFalse', label: '判断题' },
  { key: 'shortAnswer', label: '简答题' },
  { key: 'programming', label: '编程题' },
  { key: 'comprehensive', label: '综合题' }
];

function renderPracticeNav() {
  const nav = document.getElementById('practiceNav');
  nav.innerHTML = SECTIONS.map(s =>
    `<button class="${s.key === currentSection ? 'active' : ''}" onclick="switchSection('${s.key}')">${s.label}</button>`
  ).join('');
}
renderPracticeNav();

function switchSection(key) {
  currentSection = key;
  document.querySelectorAll('#practiceNav button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#practiceNav button[onclick*="${key}"]`).classList.add('active');
  document.getElementById('practiceContainer').innerHTML = renderChoices(key);
  selectedChoice = {};
  selectedTF = {};
}
switchSection('choice');

// ============================================================
// QUIZ MODE
// ============================================================
function setQuizCount(n) {
  quizCount = n;
  document.querySelectorAll('#quizSetup button[id^="qc"]').forEach(b => {
    b.style.background = '#fff';
    b.style.borderColor = 'var(--border)';
  });
  const btn = document.getElementById('qc' + n);
  if (btn) { btn.style.background = 'var(--primary-light)'; btn.style.borderColor = 'var(--primary)'; }
}

function startQuiz() {
  const pool = [];
  if (document.getElementById('qzFill').checked && QUESTIONS.fillBlank) {
    QUESTIONS.fillBlank.groups.forEach(g => g.items.forEach(item => {
      pool.push({ type: 'fill', groupTitle: g.title, tag: g.tag, ...item });
    }));
  }
  if (document.getElementById('qzChoice').checked) {
    QUESTIONS.choice.forEach(q => pool.push({ type: 'choice', ...q }));
  }
  if (document.getElementById('qzTF').checked) {
    QUESTIONS.trueFalse.forEach(q => pool.push({ type: 'tf', ...q }));
  }
  if (document.getElementById('qzProg').checked) {
    [...QUESTIONS.programming, ...QUESTIONS.comprehensive].forEach(q => pool.push({ type: 'prog', ...q }));
  }

  if (pool.length === 0) { alert('请至少选择一种题型！'); return; }

  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  quizQuestions = shuffled.slice(0, Math.min(quizCount, shuffled.length));
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = [];
  quizTime = 0;

  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  if (quizTimer) clearInterval(quizTimer);
  quizTimer = setInterval(() => {
    quizTime++;
    const d = document.getElementById('quizTimerDisplay');
    if (d) d.textContent = `⏱ ${Math.floor(quizTime/60)}:${String(quizTime%60).padStart(2,'0')}`;
  }, 1000);
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const area = document.getElementById('quizArea');
  if (quizIndex >= quizQuestions.length) { showQuizResult(); return; }

  const q = quizQuestions[quizIndex];
  const total = quizQuestions.length;
  const pct = (quizIndex / total * 100);

  let html = `
    <div class="quiz-header">
      <span>第 ${quizIndex+1}/${total} 题</span>
      <div class="quiz-stats">
        <span id="quizTimerDisplay" style="color:var(--warning)">⏱ 0:00</span>
        <span style="color:var(--success)">✓ ${quizScore}</span>
        <span style="color:var(--danger)">✗ ${quizIndex - quizScore}</span>
      </div>
    </div>
    <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${pct}%"></div></div>
  `;

  if (q.type === 'choice') {
    html += `<div class="card"><div class="q-card">
      <div class="q-number">选择题 <span class="tag tag-${q.tag}">${q.tag}</span></div>
      <div class="q-text">${q.question}</div>
      <div class="q-options" id="qzOpts">
        ${q.options.map((o, oi) => `<div class="q-option" data-qz="${oi}" onclick="qzSelectChoice(${oi})">${o}</div>`).join('')}
      </div>
      <div style="padding:0 16px 16px"><button class="btn-check" onclick="qzSubmitChoice()">提交</button></div>
      <div class="q-answer" id="qzResult"></div>
    </div></div>`;
  } else if (q.type === 'tf') {
    html += `<div class="card"><div class="q-card">
      <div class="q-number">判断题 <span class="tag tag-${q.tag}">${q.tag}</span></div>
      <div class="q-text">${q.question}</div>
      <div class="q-options">
        <div class="q-option" data-qztf="true" onclick="qzSelectTF(true)">✓ 正确</div>
        <div class="q-option" data-qztf="false" onclick="qzSelectTF(false)">✗ 错误</div>
      </div>
      <div style="padding:0 16px 16px"><button class="btn-check" onclick="qzSubmitTF()">提交</button></div>
      <div class="q-answer" id="qzResult"></div>
    </div></div>`;
  } else if (q.type === 'fill') {
    let fillHtml = '<div class="q-text" style="margin-bottom:8px;">';
    let idx = 0;
    const segments = q.text.split(/(_{4,})/g);
    segments.forEach(seg => {
      if (/_{4,}/.test(seg) && idx < q.blanks.length) {
        fillHtml += `<input class="fill-blank" id="qzFill_${idx}" data-answer="${q.blanks[idx]}" style="min-width:50px;">`;
        idx++;
      } else { fillHtml += seg; }
    });
    html += `<div class="card"><div class="q-card">
      <div class="q-number">填空题 <span class="tag tag-${q.tag}">${q.tag}</span></div>
      ${fillHtml}</div>
      <div style="padding:0 16px 16px"><button class="btn-check" onclick="qzSubmitFill()">提交</button></div>
      <div class="q-answer" id="qzResult"></div>
    </div></div>`;
  } else {
    html += `<div class="card"><div class="q-card">
      <div class="q-number">编程/综合题</div>
      <div class="q-text">${q.question}</div>
      <div style="margin-bottom:12px"><button class="btn-show-answer" onclick="document.getElementById('qzResult').classList.toggle('show')">显示答案</button></div>
      <div class="q-answer correct-ans" id="qzResult">${q.answer}</div>
      <div style="padding:0 0 8px;display:flex;gap:8px;">
        <button class="btn-correct" onclick="qzNext(true)">✓ 答对了</button>
        <button class="btn-wrong" onclick="qzNext(false)">✗ 答错了</button>
      </div>
    </div></div>`;
  }

  area.innerHTML = html;
}

let qzChoiceSelected = null;
let qzTFSelected = null;

function qzSelectChoice(oi) {
  document.querySelectorAll('[data-qz]').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`[data-qz="${oi}"]`);
  if (el) el.classList.add('selected');
  qzChoiceSelected = oi;
}

function qzSubmitChoice() {
  const q = quizQuestions[quizIndex];
  if (qzChoiceSelected === null) { alert('请先选择一个选项！'); return; }
  const correct = qzChoiceSelected === q.answer;
  document.querySelectorAll('[data-qz]').forEach(el => {
    const oi = parseInt(el.dataset.qz);
    el.classList.remove('correct', 'wrong');
    if (oi === qzChoiceSelected) el.classList.add(correct ? 'correct' : 'wrong');
    if (oi === q.answer && !correct) el.classList.add('correct');
    el.style.pointerEvents = 'none';
  });
  const ans = document.getElementById('qzResult');
  ans.classList.add('show');
  ans.classList.add(correct ? 'correct-ans' : 'wrong-ans');
  ans.innerHTML = `<span class="label">${correct ? '✅ 正确！' : '❌ 错误'}</span><br>${q.explanation}`;
  if (!correct && q.id) addToWrong({ id: q.id, type: 'choice', question: q.question, tag: q.tag, explanation: q.explanation, answer: q.answer });
  setTimeout(() => qzNext(correct), 1500);
}

function qzSelectTF(val) {
  document.querySelectorAll('[data-qztf]').forEach(el => el.classList.remove('selected'));
  document.querySelector(`[data-qztf="${val}"]`).classList.add('selected');
  qzTFSelected = val === 'true';
}

function qzSubmitTF() {
  const q = quizQuestions[quizIndex];
  if (qzTFSelected === null) { alert('请先选择！'); return; }
  const correct = qzTFSelected === q.answer;
  document.querySelectorAll('[data-qztf]').forEach(el => {
    const v = el.dataset.qztf === 'true';
    el.classList.remove('correct', 'wrong');
    if (v === qzTFSelected) el.classList.add(correct ? 'correct' : 'wrong');
    if (v === q.answer && !correct) el.classList.add('correct');
    el.style.pointerEvents = 'none';
  });
  const ans = document.getElementById('qzResult');
  ans.classList.add('show');
  ans.classList.add(correct ? 'correct-ans' : 'wrong-ans');
  ans.innerHTML = `<span class="label">${correct ? '✅ 正确！' : '❌ 错误'}</span><br>${q.explanation}`;
  if (!correct && q.id) addToWrong({ id: q.id, type: 'tf', question: q.question, tag: q.tag, explanation: q.explanation, answer: q.answer });
  setTimeout(() => qzNext(correct), 1500);
}

function qzSubmitFill() {
  const q = quizQuestions[quizIndex];
  let allCorrect = true;
  q.blanks.forEach((ans, bi) => {
    const input = document.getElementById(`qzFill_${bi}`);
    if (!input) return;
    input.classList.remove('correct', 'wrong');
    if (input.value.trim() === ans) input.classList.add('correct');
    else { input.classList.add('wrong'); allCorrect = false; }
  });
  const ans = document.getElementById('qzResult');
  ans.classList.add('show');
  ans.classList.add(allCorrect ? 'correct-ans' : 'wrong-ans');
  ans.innerHTML = `<span class="label">${allCorrect ? '✅ 全对！' : '❌ 有误'}</span><br>答案：${q.blanks.join('、')}`;
  q.blanks.forEach((_, bi) => { const inp = document.getElementById(`qzFill_${bi}`); if (inp) inp.disabled = true; });
  if (!allCorrect) addToWrong({ id: `qz_fill_${quizIndex}`, type: 'fill', question: q.text.replace(/_{4,}/g, '____'), tag: q.tag, explanation: `答案：${q.blanks.join('、')}` });
  setTimeout(() => qzNext(allCorrect), 1500);
}

function qzNext(correct) {
  if (correct) quizScore++;
  quizIndex++;
  quizAnswered.push(correct);
  renderQuizQuestion();
}

function showQuizResult() {
  const total = quizQuestions.length;
  const pct = Math.round(quizScore / total * 100);
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
  const timeStr = `${Math.floor(quizTime/60)}分${quizTime%60}秒`;
  let stars = pct >= 90 ? '⭐⭐⭐ 优秀！' : pct >= 70 ? '⭐⭐ 不错！' : pct >= 50 ? '⭐ 继续加油！' : '💪 需要多复习哦！';
  document.getElementById('quizArea').innerHTML = `
    <div class="card quiz-result">
      <div class="score">${pct}%</div>
      <div class="detail">${quizScore}/${total} 题正确 · 用时 ${timeStr}</div>
      <div class="stars">${stars}</div>
      <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="generate-btn" onclick="resetQuiz()">再来一次</button>
        <button class="btn-show-answer" onclick="document.getElementById('quizDetail').classList.toggle('show')" style="padding:12px 24px;border-radius:var(--radius);font-weight:600;cursor:pointer;">查看详情</button>
      </div>
      <div id="quizDetail" style="display:none;margin-top:16px;font-size:13px;text-align:left;">
        ${quizQuestions.map((q, i) => `<div style="padding:6px 0;border-bottom:1px solid var(--border);">
          ${i+1}. ${quizAnswered[i] ? '✅' : '❌'} ${(q.question||q.text||'').substring(0, 40)}...
        </div>`).join('')}
        <div style="padding:6px 0;color:var(--text-light);font-size:12px;">答错的题已自动加入错题本</div>
      </div>
    </div>
  `;
}

function resetQuiz() {
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
  document.getElementById('quizSetup').style.display = 'block';
  document.getElementById('quizArea').style.display = 'none';
  qzChoiceSelected = null;
  qzTFSelected = null;
}

// ============================================================
// NEW QUESTIONS
// ============================================================
function selectGenType(type) {
  genType = type;
  document.querySelectorAll('#tabNewq .section-select-btn').forEach(b => {
    b.style.background = '#fff'; b.style.borderColor = 'var(--border)';
  });
  const btn = document.getElementById('gt-' + type);
  if (btn) { btn.style.background = 'var(--primary-light)'; btn.style.borderColor = 'var(--primary)'; }
}

function generateNewQuestions() {
  const container = document.getElementById('newQuestionsContainer');
  let pool = [];
  if (genType === 'random' || genType === 'choice') pool.push(...GENERATED_POOL.choice.map(q => ({ ...q, type: 'choice' })));
  if (genType === 'random' || genType === 'fill') pool.push(...GENERATED_POOL.fill.map(q => ({ ...q, type: 'fill' })));
  if (genType === 'random' || genType === 'tf') pool.push(...GENERATED_POOL.tf.map(q => ({ ...q, type: 'tf' })));
  if (genType === 'random' || genType === 'prog') pool.push(...GENERATED_POOL.prog.map(q => ({ ...q, type: 'prog' })));
  if (pool.length < 5 && (genType === 'random' || genType === 'choice')) {
    QUESTIONS.choice.forEach(q => pool.push({ ...q, type: 'choice' }));
  }
  pool.sort(() => Math.random() - 0.5);
  const selected = pool.slice(0, 10);
  if (selected.length === 0) { container.innerHTML = '<div class="card" style="padding:20px;text-align:center;">请选择题型后生成。</div>'; return; }

  let html = `<div style="margin-top:16px;"><h3 style="margin-bottom:12px;">🔨 生成的新题（${selected.length}题）</h3></div>`;
  selected.forEach((q, i) => {
    html += `<div class="card"><div class="q-card">`;
    if (q.type === 'choice') {
      html += `<div class="q-number">${i+1}. 选择题 <span class="tag tag-${q.tag}">${q.tag}</span></div>
        <div class="q-text">${q.question}</div>
        <div class="q-options">${q.options.map((o, oi) => `<div class="q-option" onclick="this.classList.toggle('selected')">${o}</div>`).join('')}</div>
        <div class="q-actions">
          <button class="btn-check" onclick="this.nextElementSibling.classList.toggle('show');this.style.display='none'">查看答案</button>
          <div class="q-answer correct-ans" style="display:none"><span class="label">答案：</span>${String.fromCharCode(65+q.answer)}. ${q.explanation}</div>
        </div>`;
    } else if (q.type === 'fill') {
      let t = q.text;
      q.blanks.forEach((a, bi) => { t = t.replace(/_{4,}/, `<input class="fill-blank" id="ngf_${i}_${bi}" data-answer="${a}" onkeydown="if(event.key==='Enter'){const el=document.getElementById('ngf_${i}_${bi}');el.classList.remove('correct','wrong');el.classList.add(el.value.trim()==='${a}'?'correct':'wrong')}">`); });
      html += `<div class="q-number">${i+1}. 填空题 <span class="tag tag-${q.tag}">${q.tag}</span></div>
        <div class="q-text">${t}</div>
        <div class="q-actions"><button class="btn-show-answer" onclick="document.getElementById('ngf_ans_${i}').classList.toggle('show')">显示答案</button>
        <div class="q-answer correct-ans" id="ngf_ans_${i}">答案：${q.blanks.join('、')}</div></div>`;
    } else if (q.type === 'tf') {
      html += `<div class="q-number">${i+1}. 判断题 <span class="tag tag-${q.tag}">${q.tag}</span></div>
        <div class="q-text">${q.question}</div>
        <div class="q-options"><div class="q-option" onclick="this.classList.toggle('selected')">✓ 正确</div><div class="q-option" onclick="this.classList.toggle('selected')">✗ 错误</div></div>
        <div class="q-actions"><button class="btn-check" onclick="this.nextElementSibling.classList.toggle('show')">查看答案</button>
        <div class="q-answer correct-ans" style="display:none"><span class="label">答案：</span>${q.answer?'正确 ✓':'错误 ✗'}<br>${q.explanation}</div></div>`;
    } else {
      html += `<div class="q-number">${i+1}. 编程题</div>
        <div class="q-text">${q.question}</div>
        <div class="q-actions"><button class="btn-show-answer" onclick="document.getElementById('ngp_ans_${i}').classList.toggle('show')">显示答案</button>
        <div class="q-answer correct-ans" id="ngp_ans_${i}">${q.answer}</div></div>`;
    }
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

// ============================================================
// INIT
// ============================================================
loadWrongQuestions();
setQuizCount(10);
</script>
