name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Extract version
        id: version
        run: |
          VER=$(grep "APP_VERSION" www/index.html | sed "s/.*'\(.*\)'.*/\1/")
          echo "APP_VERSION=$VER" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v$VER" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Sync web assets & Android plugins
        run: npx cap sync

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ANDROID_HOME="" ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/mcu-review-app-v${{ steps.version.outputs.APP_VERSION }}.apk

      - name: Create Release
        run: |
          TAG="${{ steps.version.outputs.TAG_NAME }}"
          # Delete existing release & tag if any (re-run for same version)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin --delete "$TAG" 2>/dev/null || true
          # Generate release notes from commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
          NOTES="📱 微机原理复习宝典 v${{ steps.version.outputs.APP_VERSION }}"
          if [ -n "$PREV_TAG" ]; then
            NOTES="$NOTES"$'\n'"$(
              echo ""
              echo "---"
              git log --oneline --no-decorate "$PREV_TAG..HEAD" 2>/dev/null || git log --oneline -5
            )"
          fi
          # Create release and upload APK
          gh release create "$TAG" \
            --title "v${{ steps.version.outputs.APP_VERSION }}" \
            --notes "$NOTES" \
            --latest \
            android/app/build/outputs/apk/debug/mcu-review-app-v${{ steps.version.outputs.APP_VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
